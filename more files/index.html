<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker</title>


    <!-- google font:  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- tailwind and daisy UI  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }

        body {
            background-color: rgb(248, 250, 252);
        }
    </style>
</head>

<body>
    <header>
        <div class="navbar bg-base-100 shadow-sm px-7 justify-center flex flex-wrap gap-3 md:justify-between">
            <div class=" flex items-center  ">
                <img src="./assets/github-logo.png" alt="" class="w-10">
                <a class="btn btn-ghost md:text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <div class="flex items-center input">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                    <input id="search" type="text" placeholder="Search issues..." class="border-none" />
                </div>
                <button id="searchBtb" class="btn btn-primary"><img src="./assets/Plus.png" alt=""> New Issue</button>
            </div>
        </div>
    </header>

    <dialog id="my_modal_1" class="modal ">
        <div id="modalContent" class="modal-box p-5">

        </div>
    </dialog>
    <span id="loading" class="loading loading-spinner loading-xl fixed top-[50%] left-[50%] z-50 hidden"></span>

    <section
        class="p-4 bg-white shadow mt-8 max-w-[90%] mx-auto space-x-3 rounded-md space-y-3 flex justify-center md:justify-start flex-wrap">
        <button id="allBtn" onclick="tabFun('allBtn')" class="btn btn-primary w-30 change">All</button>
        <button id="openBtb" onclick="tabFun('openBtb')" class="btn  w-30 change">Open</button>
        <button id="closeBtn" onclick="tabFun('closeBtn')" class="btn  w-30 change">Closed</button>

    </section>
    <main class="max-w-[90%] mx-auto bg-base-100 shadow rounded-md">
        <section class="p-4 bg-white shadow mt-3  space-x-3  flex justify-between items-center rounded-t-md">
            <div class="flex items-center gap-3">
                <figure class="bg-[#ECE4FF] p-2 rounded-full">
                    <img src="./assets/Aperture.png" alt="">
                </figure>
                <div class="">
                    <p class="font-bold"><span id="count">0</span> Issues</p>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                    <button class="w-3 h-3 bg-[#00A96E] rounded-full"> </button>
                    <p>Open</p>
                </div>
                <div class="flex items-center gap-2">
                    <button class="w-3 h-3 bg-[#A855F7] rounded-full"> </button>
                    <p>Closed</p>
                </div>
            </div>

        </section>


        <section id="allContainer" class="p-5 bg-[#fbfbfb] grid md:grid-cols-3 gap-4">






        </section>
    </main>







    <script src="./script.js"></script>
</body>

</html>
